<h2 class="sr-only">Quiz total de Fundamentos de Enfermagem com mais de 300 perguntas, organizadas por sub-tema</h2>

<style>
  .quiz-wrap { padding: 1rem 0; font-family: var(--font-sans); }
  .top-bar { background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; margin-bottom: 1rem; position: sticky; top: 0; z-index: 5; }
  .stats { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; }
  .stat-block { display: flex; flex-direction: column; }
  .stat-label { font-size: 11px; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.4px; }
  .stat-num { font-size: 19px; font-weight: 500; color: var(--color-text-primary); }
  .progress-bar { height: 4px; background: rgba(0,0,0,0.08); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--color-text-info); transition: width 0.3s ease; width: 0%; }
  .filters { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 0.85rem; }
  .filter-btn { padding: 4px 9px; font-size: 11px; border: 0.5px solid var(--color-border-tertiary); background: transparent; border-radius: var(--border-radius-md); cursor: pointer; font-family: var(--font-sans); color: var(--color-text-primary); transition: all 0.15s; }
  .filter-btn:hover { background: var(--color-background-secondary); }
  .filter-btn.active { background: var(--color-text-primary); color: var(--color-background-primary); border-color: var(--color-text-primary); }
  .ctrl-btn { padding: 4px 9px; font-size: 11px; border: 0.5px solid var(--color-border-secondary); background: transparent; border-radius: var(--border-radius-md); cursor: pointer; font-family: var(--font-sans); color: var(--color-text-primary); }
  .ctrl-btn:hover { background: var(--color-background-secondary); }
  .ctrl-btn.active { background: var(--color-text-primary); color: var(--color-background-primary); }
  .section-title { font-size: 11px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin: 1.5rem 0 0.5rem; padding: 0 0.5rem; }
  .q-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 0.95rem 1.1rem; margin-bottom: 0.65rem; }
  .q-header { display: flex; gap: 5px; align-items: center; margin-bottom: 6px; flex-wrap: wrap; }
  .q-tag { display: inline-block; font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: var(--border-radius-md); letter-spacing: 0.3px; text-transform: uppercase; }
  .tag-mc { background: var(--color-background-info); color: var(--color-text-info); }
  .tag-dev { background: #EEEDFE; color: #3C3489; }
  .tag-case { background: #FAEEDA; color: #633806; }
  .tag-tf { background: #DDF1E0; color: #173404; }
  .tag-theme { background: var(--color-background-secondary); color: var(--color-text-secondary); font-size: 10px; padding: 2px 7px; border-radius: var(--border-radius-md); }
  .tag-sub { background: transparent; color: var(--color-text-tertiary); font-size: 10px; padding: 2px 4px; }
  .q-text { font-size: 14px; font-weight: 500; line-height: 1.5; margin: 0 0 10px; color: var(--color-text-primary); }
  .opt { display: block; width: 100%; text-align: left; padding: 8px 11px; margin: 4px 0; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); background: transparent; font-size: 13px; font-family: var(--font-sans); cursor: pointer; transition: all 0.15s; color: var(--color-text-primary); line-height: 1.4; }
  .opt:hover:not(:disabled) { background: var(--color-background-secondary); border-color: var(--color-border-secondary); }
  .opt.correct { background: #EAF3DE; border-color: #639922; color: #173404; }
  .opt.wrong { background: #FCEBEB; border-color: #A32D2D; color: #501313; }
  .opt:disabled { cursor: default; }
  .feedback { margin-top: 8px; padding: 8px 11px; border-radius: var(--border-radius-md); font-size: 12px; line-height: 1.5; display: none; }
  .feedback.show { display: block; }
  .feedback.ok { background: #EAF3DE; color: #173404; }
  .feedback.no { background: #FCEBEB; color: #501313; }
  .dev-toggle { background: transparent; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 6px 12px; font-size: 12px; cursor: pointer; color: var(--color-text-primary); font-family: var(--font-sans); }
  .dev-toggle:hover { background: var(--color-background-secondary); }
  .dev-answer { display: none; margin-top: 8px; padding: 11px; background: var(--color-background-secondary); border-radius: var(--border-radius-md); font-size: 12px; line-height: 1.6; color: var(--color-text-primary); }
  .dev-answer.show { display: block; }
  .dev-answer ul { margin: 4px 0 0; padding-left: 18px; }
  .dev-answer li { margin: 3px 0; }
  .dev-textarea { width: 100%; min-height: 60px; padding: 8px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); font-family: var(--font-sans); font-size: 12.5px; resize: vertical; background: var(--color-background-primary); color: var(--color-text-primary); margin-bottom: 6px; box-sizing: border-box; }
  .empty { text-align: center; padding: 2rem; color: var(--color-text-secondary); font-size: 13px; }
  .case-context { background: #FAEEDA; padding: 9px 12px; border-radius: var(--border-radius-md); font-size: 12.5px; line-height: 1.5; color: #412402; margin: 6px 0 9px; font-style: italic; border-left: 2px solid #BA7517; }
</style>

<div class="quiz-wrap">
  <div class="top-bar">
    <div class="stats">
      <div class="stat-block">
        <span class="stat-label">Acertos</span>
        <span class="stat-num"><span id="score">0</span> / <span id="total">0</span></span>
      </div>
      <div class="stat-block">
        <span class="stat-label">Respondidas</span>
        <span class="stat-num"><span id="answered">0</span></span>
      </div>
      <div class="stat-block">
        <span class="stat-label">Taxa de acerto</span>
        <span class="stat-num"><span id="rate">—</span></span>
      </div>
      <div style="display: flex; gap: 5px; flex-wrap: wrap;">
        <button class="ctrl-btn" onclick="toggleErrorMode()" id="errBtn"><i class="ti ti-alert-circle" aria-hidden="true"></i> Só erradas</button>
        <button class="ctrl-btn" onclick="toggleSections()" id="secBtn"><i class="ti ti-layout-list" aria-hidden="true"></i> Secções</button>
        <button class="ctrl-btn" onclick="resetAll()"><i class="ti ti-refresh" aria-hidden="true"></i> Reiniciar</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
  </div>

  <div class="filters" id="filters"></div>
  <div id="questions"></div>
</div>

<script>
const themes = {
  sv: "SV (geral)",
  temp: "Temperatura",
  pulso: "Pulso",
  resp: "Respiração",
  ta: "Tensão arterial",
  dor: "Dor",
  glic: "Glicemia",
  hig: "Higiene",
  proc: "Processo enfermagem",
  sng: "SNG",
  alim: "Alimentação entérica",
  lav: "Lavagem gástrica"
};

// type: mc | dev | tf | case
// theme + sub para sub-secções
const Q = [];
function add(o) { Q.push(o); }

// ============================================================
// 1. SINAIS VITAIS GERAL
// ============================================================
add({type:"mc",theme:"sv",sub:"Definição",q:"Os sinais vitais são, segundo o documento:",opts:["Um modo eficiente e rápido de monitorizar a condição do utente, identificar problemas e avaliar resposta a intervenções","Apenas indicadores administrativos","Um teste laboratorial","Apenas usados em emergência"],correct:0,fb:"Modo eficiente e rápido de monitorizar, identificar problemas e avaliar resposta."});
add({type:"mc",theme:"sv",sub:"Definição",q:"O ciclo circadiano:",opts:["É igual em todos","Faz os SV variarem entre pessoas e ao longo do dia no mesmo indivíduo","Não influencia os SV","Apenas afeta a temperatura"],correct:1,fb:"Cada indivíduo tem o seu ciclo, gerando variação inter e intra-individual."});
add({type:"mc",theme:"sv",sub:"Definição",q:"Uma alteração dos SV:",opts:["É sempre fisiológica","Solicita necessidade de intervenção médica ou de enfermagem","Não tem importância clínica","Resolve-se sem ação"],correct:1,fb:"Solicita intervenção médica ou de enfermagem."});
add({type:"mc",theme:"sv",sub:"Avaliação",q:"A avaliação dos SV:",opts:["Substitui o exame físico","É a primeira parte do exame físico","É a última parte","É independente do exame físico"],correct:1,fb:"Primeira parte do exame físico."});
add({type:"mc",theme:"sv",sub:"Avaliação",q:"O registo dos SV:",opts:["Apenas administrativo","Dá informação importante e serve como base de referência para medidas subsequentes","Não tem utilidade clínica","Apenas para faturação"],correct:1,fb:"Informação importante e base de referência."});
add({type:"mc",theme:"sv",sub:"Observações importantes",q:"Sobre o equipamento dos SV:",opts:["Qualquer um serve","Funcional e apropriado à idade e tamanho do utente","Apenas o tamanho importa","Apenas a marca importa"],correct:1,fb:"Funcional E apropriado à idade e tamanho."});
add({type:"mc",theme:"sv",sub:"Observações importantes",q:"Os fatores ambientais:",opts:["Não afetam os SV","Devem ser controlados ou minimizados antes da avaliação","Apenas relevantes em UCI","Sem importância"],correct:1,fb:"Controlar ou minimizar fatores ambientais."});
add({type:"mc",theme:"sv",sub:"Observações importantes",q:"Por que é importante saber os valores de referência do utente?",opts:["Para detetar variações relativas ao seu padrão","Apenas para registo","Não é importante","Apenas em estudo"],correct:0,fb:"Permite individualizar e detetar desvios."});
add({type:"mc",theme:"sv",sub:"Quando avaliar",q:"Em qual destas situações se avalia SV?",opts:["Apenas na admissão","Apenas em pós-operatório","Antes/durante/após transfusão de produtos sanguíneos","Apenas se o utente pedir"],correct:2,fb:"Antes, durante e após transfusão."});
add({type:"mc",theme:"sv",sub:"Quando avaliar",q:"Os SV avaliam-se também:",opts:["Apenas quando há queixas","Antes e depois de procedimento cirúrgico ou diagnóstico invasivo","Apenas em UCI","Apenas em pediatria"],correct:1,fb:"Antes/depois de procedimento cirúrgico ou diagnóstico invasivo."});
add({type:"mc",theme:"sv",sub:"Quando avaliar",q:"Quando o utente refere sintomas indeterminados:",opts:["Aguardar antes de avaliar","Avaliar SV","Pedir exames","Ignorar"],correct:1,fb:"Sintomas indeterminados de perturbação física → avaliar SV."});
add({type:"mc",theme:"sv",sub:"Quando avaliar",q:"Antes E após intervenções de enfermagem:",opts:["Não é necessário avaliar SV","Que tenham influência num dos SV, deve avaliar-se","Apenas se for cirurgia","Apenas se for transfusão"],correct:1,fb:"Avaliar antes/após intervenções que influenciem um SV."});
add({type:"mc",theme:"sv",sub:"Registo gráfico",q:"Cor PRETA no registo:",opts:["Pulso","Temperatura","Respiração","TA"],correct:2,fb:"Preto = respiração."});
add({type:"mc",theme:"sv",sub:"Registo gráfico",q:"Cor VERMELHA:",opts:["Temperatura","Pulso","Respiração","Dor"],correct:1,fb:"Vermelho = pulso."});
add({type:"mc",theme:"sv",sub:"Registo gráfico",q:"Cor AZUL:",opts:["Pulso","Temperatura","Respiração","TA"],correct:1,fb:"Azul = temperatura."});
add({type:"mc",theme:"sv",sub:"Registo gráfico",q:"Cor VERDE:",opts:["Pulso","Temperatura","Respiração","Tensão arterial"],correct:3,fb:"Verde = TA."});
add({type:"mc",theme:"sv",sub:"Registo gráfico",q:"Cor ROSA / azul:",opts:["Pulso","Dor","Temperatura","Respiração"],correct:1,fb:"Rosa/azul = dor."});
add({type:"mc",theme:"sv",sub:"5 sinais",q:"Os cinco sinais vitais são:",opts:["Temperatura, pulso, respiração, TA, glicemia","Temperatura, pulso, respiração, TA, dor","Temperatura, pulso, respiração, TA, peso","Pulso, respiração, TA, dor, saturação"],correct:1,fb:"Temperatura, pulso, respiração, TA, dor."});

// ============================================================
// 2. TEMPERATURA
// ============================================================
add({type:"mc",theme:"temp",sub:"Definição",q:"A temperatura corporal corresponde a:",opts:["Calor exterior","Calor interno do corpo, relacionado com o metabolismo corporal","Pressão hidrostática","Volume sanguíneo"],correct:1,fb:"Calor interno, relacionado com o metabolismo."});
add({type:"mc",theme:"temp",sub:"Regulação",q:"A temperatura é regulada por:",opts:["Apenas hipotálamo","Hipotálamo (anterior+posterior) e tiroide","Apenas tiroide","Hipófise e adrenais"],correct:1,fb:"Hipotálamo (anterior=perda; posterior=produção) + tiroide."});
add({type:"mc",theme:"temp",sub:"Regulação",q:"O hipotálamo ANTERIOR:",opts:["Produção de calor","Perda de calor","Regula pulso","Regula glicemia"],correct:1,fb:"Anterior = perda."});
add({type:"mc",theme:"temp",sub:"Regulação",q:"O hipotálamo POSTERIOR:",opts:["Perda de calor","Produção de calor","Regula respiração","Regula TA"],correct:1,fb:"Posterior = produção."});
add({type:"mc",theme:"temp",sub:"Valores",q:"Temperatura corporal normal:",opts:["35º-36º","36º-37,4º","37,5º-38,5º","38º-39º"],correct:1,fb:"36º-37,4º, dependendo do local."});
add({type:"mc",theme:"temp",sub:"Valores",q:"O valor varia conforme:",opts:["Apenas como é monitorizada","Como E onde é monitorizada","Apenas onde","Apenas a hora"],correct:1,fb:"Como (técnica) e onde (local)."});
add({type:"mc",theme:"temp",sub:"Risco extremos",q:"Em criança e idoso, temperatura ambiental que pode causar morte:",opts:["< 5º ou > 40º","< 10º ou > 35º","< 15º ou > 30º","< 20º ou > 25º"],correct:0,fb:"< 5º ou > 40º."});
add({type:"mc",theme:"temp",sub:"Variação",q:"A temperatura varia com:",opts:["Apenas idade","Idade, sexo, ritmo circadiano, atividade física, hormonas, stress, hidratação, estado de saúde, meio","Apenas sexo","Apenas idade e hidratação"],correct:1,fb:"Múltiplos fatores listados."});
add({type:"mc",theme:"temp",sub:"Alterações",q:"A temperatura sofre alterações em:",opts:["Apenas infeções","Doenças metabólicas, infeções graves, EAM ou após cirurgias","Apenas pós-cirurgia","Apenas EAM"],correct:1,fb:"Doenças metabólicas, infeções graves, EAM, pós-cirurgia."});
add({type:"mc",theme:"temp",sub:"Hipotermia",q:"Sinais de hipotermia incluem:",opts:["Pele quente e seca","Pele fria, pálida e seca, tremores, taquicardia, hipertensão, leitos ungueais cianosados, piloereção","Hipotensão e bradicardia","Sudorese profusa"],correct:1,fb:"Hipotermia: pele fria/pálida/seca + tremores + taquicardia + hipertensão + cianose ungueal + piloereção."});
add({type:"mc",theme:"temp",sub:"Hipotermia",q:"A hipotermia pode estar associada a:",opts:["Cirurgia","Exposição prolongada ao frio, disfunção do SNC ou endócrino, ou indução terapêutica","Refeições copiosas","Atividade física"],correct:1,fb:"Frio prolongado, disfunção SNC/endócrino, indução terapêutica."});
add({type:"mc",theme:"temp",sub:"Hipotermia",q:"O preenchimento capilar na hipotermia é:",opts:["Rápido","Lento","Normal","Inexistente"],correct:1,fb:"Preenchimento capilar lento na hipotermia."});
add({type:"mc",theme:"temp",sub:"Hipertermia",q:"Sinais de hipertermia:",opts:["Pele fria, tremores","Pele quente e seca, sonolência, cefaleia","Cianose, hipotensão","Tremores e calafrios"],correct:1,fb:"Pele quente e seca, sonolência, cefaleia."});
add({type:"mc",theme:"temp",sub:"Hipertermia",q:"A hipertermia associa-se a:",opts:["Apenas frio","Disfunção SNC/endócrino, choque pelo calor ou indução terapêutica","Apenas exercício","Apenas medicamentos"],correct:1,fb:"Disfunção SNC/endócrino, choque pelo calor, indução terapêutica."});
add({type:"mc",theme:"temp",sub:"Monitorização",q:"Local PREFERENCIAL de monitorização:",opts:["Axilar","Retal","Timpânico","Oral"],correct:2,fb:"Preferencialmente timpânico; alternativas: axilar, retal, oral."});
add({type:"mc",theme:"temp",sub:"Locais",q:"Locais CENTRAIS de medição:",opts:["Axila, oral, inguinal","Reto, tímpano, esófago, artéria pulmonar, bexiga","Apenas axila","Apenas oral"],correct:1,fb:"Centrais: reto, tímpano, esófago, artéria pulmonar, bexiga."});
add({type:"mc",theme:"temp",sub:"Locais",q:"Locais SUPERFICIAIS de medição:",opts:["Reto, tímpano, esófago","Pele, axilas, região inguinal, cavidade oral","Artéria pulmonar","Bexiga"],correct:1,fb:"Superficiais: pele, axilas, inguinal, oral."});
add({type:"mc",theme:"temp",sub:"Termómetros",q:"Os termómetros de mercúrio:",opts:["São preferenciais","Não devem ser utilizados — substituídos por Galinstan","Apenas em pediatria","São equivalentes aos eletrónicos"],correct:1,fb:"Substituídos por Galinstan (gálio, índio, estanho)."});
add({type:"mc",theme:"temp",sub:"Termómetros",q:"O Galinstan é composto por:",opts:["Gálio, índio, estanho","Gálio e mercúrio","Índio e zinco","Mercúrio e estanho"],correct:0,fb:"Gálio + Índio + Estanho = Galinstan."});
add({type:"mc",theme:"temp",sub:"Termómetros",q:"Termómetro para anestesia geral, hipotermia/hipertermia (monitorização contínua):",opts:["Tira plástica","Eletrónico intermitente","Eletrónico contínuo","Infravermelhos"],correct:2,fb:"Eletrónico contínuo."});
add({type:"mc",theme:"temp",sub:"Termómetros",q:"Termómetros eletrónicos intermitentes:",opts:["~5s","~15s","~60s, oral/retal/axilar","~5min"],correct:2,fb:"~60s, em oral, retal e axilar."});
add({type:"mc",theme:"temp",sub:"Termómetros",q:"Tira plástica:",opts:["Hospitalar","Muda de cor consoante temperatura, ~15s, uso doméstico em crianças","Apenas UCI","Apenas anestesia"],correct:1,fb:"Muda de cor em ~15s, doméstico (crianças)."});
add({type:"mc",theme:"temp",sub:"Termómetros",q:"Termómetros de infravermelhos:",opts:["Contacto direto","Recebem radiação térmica de um local específico","Aplicam calor","Medem humidade"],correct:1,fb:"Recebem radiação térmica."});
add({type:"mc",theme:"temp",sub:"Cuidados",q:"Antes de monitorizar a temperatura:",opts:["Improvisar","Consultar processo do utente para individualizar cuidados","Não consultar","Apenas registar"],correct:1,fb:"Consultar processo para individualizar."});
add({type:"tf",theme:"temp",sub:"Conceitos",q:"Verdadeiro ou falso: a hipotermia inclui hipertensão e taquicardia.",opts:["Verdadeiro","Falso"],correct:0,fb:"Verdadeiro: hipertensão E taquicardia (resposta compensatória)."});
add({type:"tf",theme:"temp",sub:"Conceitos",q:"Verdadeiro ou falso: o hipotálamo anterior produz calor.",opts:["Verdadeiro","Falso"],correct:1,fb:"Falso: anterior=perda; posterior=produção."});

// ============================================================
// 3. PULSO
// ============================================================
add({type:"mc",theme:"pulso",sub:"Definição",q:"Pulso define-se como:",opts:["Pressão diastólica","Choque da onda sistólica na parede da artéria, sentido pelos dedos comprimindo a artéria sobre saliência óssea","Pressão venosa","Frequência cardíaca apenas"],correct:1,fb:"Choque da onda sistólica sobre saliência óssea."});
add({type:"mc",theme:"pulso",sub:"Definição",q:"A pulsação é sentida como:",opts:["Compressão venosa","Expansão das artérias quando submetidas à pressão do sangue","Vibração óssea","Espasmo muscular"],correct:1,fb:"Expansão arterial sob pressão sanguínea."});
add({type:"mc",theme:"pulso",sub:"Locais",q:"Local PREFERENCIAL no adulto:",opts:["Carotídeo","Apical","Radial","Femoral"],correct:2,fb:"Radial é o preferencial."});
add({type:"mc",theme:"pulso",sub:"Locais",q:"Em latentes e crianças, alternativa de fácil acesso:",opts:["Radial","Temporal","Carotídeo","Apical"],correct:1,fb:"Temporal em latentes/crianças (fácil acesso)."});
add({type:"mc",theme:"pulso",sub:"Locais",q:"Em emergência ou choque, avaliam-se:",opts:["Radial e cubital","Carotídeo e femoral","Tibial posterior e dorso pé","Temporal e poplíteo"],correct:1,fb:"Carotídeo e femoral em emergência (grandes vasos centrais)."});
add({type:"mc",theme:"pulso",sub:"Locais",q:"Em latentes (< 2 anos) e arritmias, avalia-se:",opts:["Radial","Apical","Carotídeo","Temporal"],correct:1,fb:"Apical em latentes e arritmias."});
add({type:"mc",theme:"pulso",sub:"Locais",q:"Pulso braquial usa-se para:",opts:["Apenas frequência","Auscultar TA nos MS, e como local alternativo","Apenas circulação","Bebés"],correct:1,fb:"Braquial: TA nos MS e alternativa."});
add({type:"mc",theme:"pulso",sub:"Locais",q:"Pulso cubital avalia:",opts:["TA","Estado da circulação para a mão","Frequência geral","Bebés"],correct:1,fb:"Cubital: circulação para a mão."});
add({type:"mc",theme:"pulso",sub:"Locais",q:"Pulso poplíteo:",opts:["TA nos MI","Bebés","Mão","Coração"],correct:0,fb:"Poplíteo ausculta TA nos MI."});
add({type:"mc",theme:"pulso",sub:"Locais",q:"Pulsos para circulação do PÉ:",opts:["Femoral e poplíteo","Tibial posterior e dorso do pé","Apical","Carotídeo"],correct:1,fb:"Tibial posterior e dorso do pé."});
add({type:"mc",theme:"pulso",sub:"Frequência",q:"Taquicardia:",opts:["< 60 bpm","60-100 bpm","> 100 bpm","> 200 bpm"],correct:2,fb:"> 100 bpm."});
add({type:"mc",theme:"pulso",sub:"Frequência",q:"Bradicardia:",opts:["< 60 bpm","< 80 bpm","< 100 bpm","< 120 bpm"],correct:0,fb:"< 60 bpm."});
add({type:"mc",theme:"pulso",sub:"Ritmo",q:"Pulso RÍTMICO:",opts:["Intervalos desiguais","Intervalos iguais entre pulsações","Apenas regular >100 bpm","Apenas <60 bpm"],correct:1,fb:"Rítmico = intervalos iguais."});
add({type:"mc",theme:"pulso",sub:"Ritmo",q:"Pulso ARRÍTMICO:",opts:["Intervalos iguais","Intervalos desiguais e inconstantes","Apenas frequência alta","Apenas frequência baixa"],correct:1,fb:"Desiguais e inconstantes."});
add({type:"mc",theme:"pulso",sub:"Amplitude",q:"Amplitude do pulso é:",opts:["Frequência","Padrão","Volume de sangue impulsionado durante a contração ventricular","Resistência arterial"],correct:2,fb:"Volume na contração ventricular, sentido pelos dedos."});
add({type:"mc",theme:"pulso",sub:"Amplitude",q:"Pulso FORTE:",opts:["↓ volume ejeção","↑ volume ejeção","Arrítmico","Filiforme"],correct:1,fb:"Forte = aumento volume de ejeção."});
add({type:"mc",theme:"pulso",sub:"Amplitude",q:"Pulso fraco/débil/fino/filiforme:",opts:["↑ volume ejeção","↓ volume ejeção","Arrítmico","Forte"],correct:1,fb:"Filiforme = redução volume ejeção."});
add({type:"mc",theme:"pulso",sub:"Amplitude",q:"O documento refere os seguintes tipos de amplitude:",opts:["Apenas forte e fraco","Forte, fraco/débil/filiforme, normal e ausente","Apenas forte e ausente","Apenas normal"],correct:1,fb:"Forte, fraco/débil/fino/filiforme, normal e ausente."});

Q.forEach((q, i) => q._id = i);

const filtersDiv = document.getElementById('filters');
let activeFilter = 'all';
let errorMode = false;
let showSections = true;

function buildFilters() {
  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn active';
  allBtn.textContent = `Todas (${Q.length})`;
  allBtn.dataset.theme = 'all';
  allBtn.onclick = () => setFilter('all');
  filtersDiv.appendChild(allBtn);

  Object.entries(themes).forEach(([key, label]) => {
    const count = Q.filter(q => q.theme === key).length;
    if (count === 0) return;
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.theme = key;
    btn.textContent = `${label} (${count})`;
    btn.onclick = () => setFilter(key);
    filtersDiv.appendChild(btn);
  });
}

function setFilter(theme) {
  activeFilter = theme;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.theme === theme);
  });
  render();
}

function toggleErrorMode() {
  errorMode = !errorMode;
  document.getElementById('errBtn').classList.toggle('active', errorMode);
  render();
}

function toggleSections() {
  showSections = !showSections;
  document.getElementById('secBtn').classList.toggle('active', !showSections);
  render();
}

const state = {};

function render() {
  const container = document.getElementById('questions');
  container.innerHTML = '';
  let filtered = activeFilter === 'all' ? Q : Q.filter(q => q.theme === activeFilter);
  if (errorMode) {
    filtered = filtered.filter(q => (q.type === 'mc' || q.type === 'tf' || q.type === 'case') && state[q._id] && state[q._id].answered && !state[q._id].correct);
  }

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty">' + (errorMode ? 'Sem perguntas erradas neste filtro 🎉' : 'Nenhuma pergunta neste tema.') + '</div>';
    updateStats();
    return;
  }

  let lastSubKey = null;
  filtered.forEach((q, displayIdx) => {
    const subKey = q.theme + '|' + (q.sub || '');
    if (showSections && subKey !== lastSubKey && activeFilter !== 'all') {
      const sectionTitle = document.createElement('div');
      sectionTitle.className = 'section-title';
      sectionTitle.textContent = q.sub || '';
      container.appendChild(sectionTitle);
      lastSubKey = subKey;
    }

    const card = document.createElement('div');
    card.className = 'q-card';
    const num = displayIdx + 1;
    const themeLabel = themes[q.theme];
    const s = state[q._id] || {};
    const caseHtml = q.case ? `<div class="case-context">${q.case}</div>` : '';

    let tagClass = 'tag-mc', tagText = 'MC';
    if (q.type === 'tf') { tagClass = 'tag-tf'; tagText = 'V/F'; }
    else if (q.type === 'dev') { tagClass = 'tag-dev'; tagText = 'Dev'; }
    else if (q.case) { tagClass = 'tag-case'; tagText = 'Caso'; }

    if (q.type === 'mc' || q.type === 'tf') {
      card.innerHTML = `
        <div class="q-header">
          <span class="q-tag ${tagClass}">${tagText}</span>
          <span class="tag-theme">${themeLabel}</span>
          ${q.sub ? `<span class="tag-sub">· ${q.sub}</span>` : ''}
        </div>
        ${caseHtml}
        <p class="q-text">${num}. ${q.q}</p>
        <div id="opts-${q._id}"></div>
        <div class="feedback" id="fb-${q._id}"></div>
      `;
      container.appendChild(card);

      const optsDiv = document.getElementById(`opts-${q._id}`);
      q.opts.forEach((opt, j) => {
        const btn = document.createElement('button');
        btn.className = 'opt';
        btn.textContent = opt;
        btn.onclick = () => handleMC(q._id, j);
        if (s.answered) {
          btn.disabled = true;
          if (j === q.correct) btn.classList.add('correct');
          if (j === s.selected && j !== q.correct) btn.classList.add('wrong');
        }
        optsDiv.appendChild(btn);
      });

      if (s.answered) {
        const fb = document.getElementById(`fb-${q._id}`);
        fb.className = 'feedback show ' + (s.correct ? 'ok' : 'no');
        fb.textContent = (s.correct ? '' : 'Não. ') + q.fb;
      }
    } else {
      card.innerHTML = `
        <div class="q-header">
          <span class="q-tag tag-dev">Desenvolvimento</span>
          <span class="tag-theme">${themeLabel}</span>
          ${q.sub ? `<span class="tag-sub">· ${q.sub}</span>` : ''}
        </div>
        <p class="q-text">${num}. ${q.q}</p>
        <textarea class="dev-textarea" placeholder="Escreve a tua resposta..."></textarea>
        <button class="dev-toggle" onclick="toggleAnswer(${q._id})">${s.devOpen ? 'Esconder resposta' : 'Ver resposta'}</button>
        <div class="dev-answer ${s.devOpen ? 'show' : ''}" id="ans-${q._id}">
          <strong>Resposta:</strong>
          <ul>${q.answer.map(a => `<li>${a}</li>`).join('')}</ul>
        </div>
      `;
      container.appendChild(card);
    }
  });

  updateStats();
}

function handleMC(qId, optIdx) {
  if (state[qId] && state[qId].answered) return;
  const q = Q.find(x => x._id === qId);
  state[qId] = { answered: true, selected: optIdx, correct: optIdx === q.correct };
  render();
}

function toggleAnswer(qId) {
  state[qId] = state[qId] || {};
  state[qId].devOpen = !state[qId].devOpen;
  render();
}

function updateStats() {
  const mcQs = Q.filter(q => q.type === 'mc' || q.type === 'tf');
  const total = mcQs.length;
  const answered = mcQs.filter(q => state[q._id] && state[q._id].answered).length;
  const score = mcQs.filter(q => state[q._id] && state[q._id].correct).length;
  document.getElementById('total').textContent = total;
  document.getElementById('score').textContent = score;
  document.getElementById('answered').textContent = answered;
  document.getElementById('rate').textContent = answered === 0 ? '—' : Math.round(score / answered * 100) + '%';
  document.getElementById('progress').style.width = (answered / total * 100) + '%';
}

function resetAll() {
  for (const k in state) delete state[k];
  render();
}

buildFilters();
render();
</script>
